<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coreprompt Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <span>Coreprompt</span>
    </header>

    <main>
      <div class="field">
        <label for="api-key">Gemini API Key</label>
        <div class="input-row">
          <input
            type="password"
            id="api-key"
            placeholder="AIza…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="toggle-visibility" title="Show/hide key" type="button">
            <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="hint">
          Get your key at
          <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
          It's stored locally in your browser only.
        </p>
      </div>

      <div id="status" class="status hidden"></div>

      <button id="save-btn" type="button">Save</button>
    </main>

    <footer>
      <span>Works on ChatGPT · Claude · Gemini · Grok · Perplexity</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
